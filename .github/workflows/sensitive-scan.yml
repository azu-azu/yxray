name: Sensitive Data Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sensitive-scan:
    name: Scan for sensitive patterns
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for sensitive patterns
        run: |
          set +e
          FAILED=0

          # Files and directories to skip (includes .github so the workflow itself isn't flagged)
          EXCLUDE_FLAGS="--exclude-dir=.git --exclude-dir=.github --exclude-dir=node_modules --exclude-dir=.venv --exclude-dir=venv --exclude-dir=dist"

          check_pattern() {
            local label="$1"
            local pattern="$2"
            local MATCHES
            MATCHES=$(grep -rn $EXCLUDE_FLAGS -E "$pattern" . \
              --include="*.py" \
              --include="*.ts" \
              --include="*.tsx" \
              --include="*.js" \
              --include="*.json" \
              --include="*.yml" \
              --include="*.yaml" \
              --include="*.toml" \
              --include="*.html" \
              --include="*.md" \
              2>/dev/null)
            if [ -n "$MATCHES" ]; then
              echo "::error::Sensitive pattern found: $label"
              echo "$MATCHES"
              FAILED=1
            fi
          }

          check_pattern "company-name-lowercase" "sagen"
          check_pattern "company-name-uppercase" "SAGEN(_[A-Z_]+)?"
          check_pattern "bare-SIN-field"          "SIN[^A-Z_]"
          check_pattern "bare-SSN-field"          "SSN[^A-Z_]"
          check_pattern "ssn-number-format"       "[0-9]{3}-[0-9]{2}-[0-9]{4}"

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Sensitive patterns detected. Remove them before merging."
            exit 1
          fi

          echo "No sensitive patterns found."
