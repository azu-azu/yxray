name: Build and Release

"on":
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: uv sync --group build

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Build React frontend
        working-directory: app/frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Generate version info
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $version = "$env:TAG_NAME".TrimStart('v') + ".0"
          uv run pyivf-make_version --source-format yaml --metadata-source version_info.yml --outfile file_version_info.txt --version "$version"

      - name: Build EXE
        run: uv run pyinstaller app.spec --noconfirm

      - name: Determine pre-release status
        id: prerelease
        env:
          TAG: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $tag = $env:TAG
          $isPrerelease = $tag -match '^v0\.' -or $tag -match '-(alpha|beta|rc)(\.\d+)?$'
          echo "value=$($isPrerelease.ToString().ToLower())" >> $env:GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@d5382d3e6f2fa7bd53cb749d33091853d4985daf  # v2.3.0
        with:
          prerelease: ${{ steps.prerelease.outputs.value == 'true' }}
          files: dist/AlteryxGitCompanion.exe
          body: |
            ## Alteryx Git Companion

            ### Installation

            Download `AlteryxGitCompanion.exe` and double-click to run.

            **Windows SmartScreen warning:** Windows may show a SmartScreen warning because the app is not yet code-signed. Click **More info** then **Run anyway** to proceed.
